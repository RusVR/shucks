<!DOCTYPE html>
<html>
<head>
    <title>Shucks</title>
    <style>
        body {
            font-family: Arial;
            transition: background 0.3s, color 0.3s;
            margin: 20px;
        }

        #chat {
            border: 1px solid;
            height: 300px;
            overflow-y: auto;
            margin-bottom: 10px;
            padding: 5px;
        }

        #chat p {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #chat img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        #chat .timestamp {
            font-size: 0.7em;
            color: gray;
        }

        button {
            margin-left: 5px;
            padding: 5px 10px;
        }

        input[type=text] {
            width: 60%;
            padding: 5px;
        }

        input[type=file] {
            display: none;
        }

        .dark {
            background-color: #1e1e1e;
            color: #ffffff;
        }

        .dark #chat {
            border-color: #555;
        }

        .dark input {
            background-color: #333;
            color: white;
            border: 1px solid #555;
        }

        .dark button {
            background-color: #333;
            color: white;
            border: 1px solid #555;
        }
    </style>
</head>
<body>

<h1>Shucks</h1>

<button onclick="changeUsername()">Change Username</button>
<button onclick="triggerProfilePicUpload()">Change Profile Picture</button>
<button onclick="toggleDarkMode()">Toggle Dark Mode</button>

<div id="chat"></div>

<input id="messageInput" placeholder="Type something..." />
<button onclick="sendMessage()">Send</button>

<input type="file" id="profilePicInput" accept="image/*" />

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();

    let username = localStorage.getItem("shucks_username");
    let darkMode = localStorage.getItem("shucks_darkmode");
    let profilePic = localStorage.getItem("shucks_profilePic") || "https://via.placeholder.com/24";

    if (!username) {
        username = prompt("What should we call you?");
        if (!username || username.trim() === "") username = "User";
        localStorage.setItem("shucks_username", username);
    }

    if (darkMode === "enabled") document.body.classList.add("dark");

    const chatDiv = document.getElementById("chat");
    const input = document.getElementById("messageInput");
    const fileInput = document.getElementById("profilePicInput");

    // Load saved chat history
    let chatHistory = JSON.parse(localStorage.getItem("shucks_chatHistory") || "[]");
    chatHistory.forEach(item => appendMessage(item.msg, item.img, item.time));

    function appendMessage(msg, img, time) {
        const p = document.createElement("p");
        const avatar = document.createElement("img");
        avatar.src = img;
        const text = document.createTextNode(msg + " ");
        const timestamp = document.createElement("span");
        timestamp.className = "timestamp";
        timestamp.textContent = time ? `(${time})` : "";
        p.appendChild(avatar);
        p.appendChild(text);
        p.appendChild(timestamp);
        chatDiv.appendChild(p);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    function sendMessage() {
        const message = input.value;
        if (!message.trim()) return;
        const now = new Date();
        const time = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        const fullMessage = username + ": " + message;
        const messageData = { msg: fullMessage, img: profilePic, time: time };

        socket.emit("chat message", messageData);
        input.value = "";
    }

    socket.on("chat message", (data) => {
        appendMessage(data.msg, data.img, data.time);

        // Save to history
        chatHistory.push({ msg: data.msg, img: data.img, time: data.time });
        localStorage.setItem("shucks_chatHistory", JSON.stringify(chatHistory));
    });

    function changeUsername() {
        let newName = prompt("Enter your new username:");
        if (!newName || newName.trim() === "") return alert("Username cannot be empty.");
        username = newName;
        localStorage.setItem("shucks_username", username);
    }

    function triggerProfilePicUpload() {
        fileInput.click();
    }

    fileInput.addEventListener("change", function() {
        const file = this.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            profilePic = e.target.result;
            localStorage.setItem("shucks_profilePic", profilePic);
            alert("Profile picture updated!");
        };
        reader.readAsDataURL(file);
    });

    function toggleDarkMode() {
        document.body.classList.toggle("dark");
        if (document.body.classList.contains("dark")) {
            localStorage.setItem("shucks_darkmode", "enabled");
        } else {
            localStorage.setItem("shucks_darkmode", "disabled");
        }
    }

    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            sendMessage();
        }
    });
</script>

</body>
</html>
